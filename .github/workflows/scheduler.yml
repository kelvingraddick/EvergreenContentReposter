name: Evergreen scheduler

on:
  schedule:
    # 08:00 and 16:00 America/New_York during EDT (UTC-4).
    # Change to "0 13,21 * * *" during EST (UTC-5).
    - cron: "0 12,20 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "LOOKBACK_DAYS override for this manual run"
        required: false
        default: "90"
      post_id:
        description: "Optional direct post override (Airtable record ID or numeric {Id})"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Run
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_POSTS_TABLE: ${{ secrets.AIRTABLE_POSTS_TABLE }}
          AIRTABLE_JOBS_TABLE: ${{ secrets.AIRTABLE_JOBS_TABLE }}
          AIRTABLE_PUBLISHED_TABLE: ${{ secrets.AIRTABLE_PUBLISHED_TABLE }}

          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_DISABLE_AUTO_REFRESH: ${{ secrets.THREADS_DISABLE_AUTO_REFRESH }}

          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '90' }}
          DIRECT_POST_ID: ${{ github.event.inputs.post_id || '' }}
        run: |
          mkdir -p artifacts
          set -o pipefail
          node src/run.js 2>&1 | tee artifacts/run.log

      - name: Upload run logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-console-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/run.log
          if-no-files-found: warn
